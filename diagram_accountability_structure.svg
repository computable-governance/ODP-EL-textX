<svg width="680" height="360" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Accountability structure of the GP referral scenario (internal reference)</title>
<rect width="680" height="360" fill="#ffffff"/>
<defs>
<marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<g>
<rect x="60" y="40" width="220" height="200" rx="16" fill="none" stroke="#999" stroke-width="0.8"/>
<text x="170" y="64" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#222">GP practice</text>
</g>
<g>
<rect x="100" y="90" width="140" height="50" rx="6" fill="#f2f2f0" stroke="#999" stroke-width="0.8"/>
<text x="170" y="112" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#222">GP practice party</text>
<text x="170" y="128" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">principal</text>
</g>
<line x1="170" y1="140" x2="170" y2="170" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow-gray)"/>
<text x="195" y="158" font-family="sans-serif" font-size="10" fill="#666">principal of</text>
<g>
<rect x="100" y="170" width="140" height="50" rx="6" fill="#d6ece8" stroke="#3f8f7f" stroke-width="0.8"/>
<text x="170" y="192" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#222">GP clinician</text>
<text x="170" y="208" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">agent</text>
</g>

<g>
<rect x="400" y="40" width="220" height="200" rx="16" fill="none" stroke="#999" stroke-width="0.8"/>
<text x="510" y="64" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#222">Specialist practice</text>
</g>
<g>
<rect x="440" y="90" width="140" height="50" rx="6" fill="#f2f2f0" stroke="#999" stroke-width="0.8"/>
<text x="510" y="112" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#222">Specialist party</text>
<text x="510" y="128" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">principal</text>
</g>
<line x1="510" y1="140" x2="510" y2="170" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow-gray)"/>
<text x="535" y="158" font-family="sans-serif" font-size="10" fill="#666">principal of</text>
<g>
<rect x="440" y="170" width="140" height="50" rx="6" fill="#fbe0d6" stroke="#D85A30" stroke-width="0.8"/>
<text x="510" y="192" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#222">Specialist clinician</text>
<text x="510" y="208" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">agent</text>
</g>

<path d="M240 105 L400 105 L580 165" fill="none" stroke="#D85A30" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow-red)"/>
<text x="340" y="95" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">delegates one obligation</text>
<text x="340" y="111" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">(crosses the boundary)</text>

<text x="170" y="270" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">GP practice party remains</text>
<text x="170" y="286" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">accountable even though the</text>
<text x="170" y="302" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">specialist clinician is the one</text>
<text x="170" y="318" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">who actually acts on it.</text>

<text x="510" y="270" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">No link exists directly between</text>
<text x="510" y="286" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">the two clinician agents —</text>
<text x="510" y="302" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">only between the GP practice</text>
<text x="510" y="318" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">party and the specialist agent.</text>
</svg>
