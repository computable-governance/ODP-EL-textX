<svg width="680" height="540" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Comparison of a workflow view versus a deontic coordination view of the same GP referral task</title>
<rect width="680" height="540" fill="#ffffff"/>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text x="160" y="26" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="600" fill="#222">Workflow view</text>
<text x="160" y="42" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">fixed sequence, one path</text>

<text x="500" y="26" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="600" fill="#222">Coordination view</text>
<text x="500" y="42" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">obligations feeding one objective, no fixed order</text>

<line x1="340" y1="20" x2="340" y2="520" stroke="#ccc" stroke-width="0.8" stroke-dasharray="3 3"/>

<!-- Workflow side -->
<g>
<rect x="60" y="60" width="200" height="40" rx="6" fill="#f2f2f0" stroke="#999" stroke-width="0.8"/>
<text x="160" y="84" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#222">1. GP initiates referral</text>
</g>
<line x1="160" y1="100" x2="160" y2="130" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>

<g>
<rect x="60" y="130" width="200" height="40" rx="6" fill="#f2f2f0" stroke="#999" stroke-width="0.8"/>
<text x="160" y="154" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#222">2. GP sends clinical info</text>
</g>
<line x1="160" y1="170" x2="160" y2="200" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>

<g>
<rect x="60" y="200" width="200" height="40" rx="6" fill="#f2f2f0" stroke="#999" stroke-width="0.8"/>
<text x="160" y="224" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#222">3. Specialist acknowledges</text>
</g>
<line x1="160" y1="240" x2="160" y2="270" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>

<g>
<rect x="60" y="270" width="200" height="40" rx="6" fill="#f2f2f0" stroke="#999" stroke-width="0.8"/>
<text x="160" y="294" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#222">4. Specialist schedules</text>
</g>
<line x1="160" y1="310" x2="160" y2="340" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>

<g>
<rect x="60" y="340" width="200" height="40" rx="6" fill="#f2f2f0" stroke="#999" stroke-width="0.8"/>
<text x="160" y="364" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#222">5. Assessment happens</text>
</g>

<text x="160" y="420" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">If step 3 stalls, step 4 cannot</text>
<text x="160" y="436" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">start — the diagram has no way</text>
<text x="160" y="452" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">to say what else could happen.</text>

<!-- Coordination side -->
<g>
<rect x="375" y="70" width="105" height="50" rx="6" fill="#d6ece8" stroke="#3f8f7f" stroke-width="0.8"/>
<text x="427" y="92" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#222">Initiate</text>
<text x="427" y="108" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#444">GP clinician</text>
</g>
<g>
<rect x="520" y="70" width="105" height="50" rx="6" fill="#d6ece8" stroke="#3f8f7f" stroke-width="0.8"/>
<text x="572" y="92" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#222">Hand over</text>
<text x="572" y="108" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#444">GP clinician</text>
</g>

<g>
<rect x="375" y="160" width="105" height="50" rx="6" fill="#fbe0d6" stroke="#D85A30" stroke-width="0.8"/>
<text x="427" y="182" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#222">Respond</text>
<text x="427" y="198" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#444">specialist clinician</text>
</g>
<g>
<rect x="520" y="160" width="105" height="50" rx="6" fill="#fbe0d6" stroke="#D85A30" stroke-width="0.8"/>
<text x="572" y="182" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#222">Schedule</text>
<text x="572" y="198" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#444">specialist clinician</text>
</g>

<!-- Legend -->
<rect x="375" y="225" width="14" height="14" rx="3" fill="#d6ece8" stroke="#3f8f7f" stroke-width="0.8"/>
<text x="394" y="236" font-family="sans-serif" font-size="11" fill="#444">GP clinician</text>
<rect x="520" y="225" width="14" height="14" rx="3" fill="#fbe0d6" stroke="#D85A30" stroke-width="0.8"/>
<text x="539" y="236" font-family="sans-serif" font-size="11" fill="#444">specialist clinician</text>

<!-- Connectors -->
<path d="M427 120 L427 145 L500 145 L500 290" fill="none" stroke="#D85A30" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow-red)"/>
<path d="M572 120 L572 145 L500 145" fill="none" stroke="#D85A30" stroke-width="1.2" stroke-dasharray="4 3"/>
<path d="M427 210 L460 250 L460 290" fill="none" stroke="#D85A30" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow-red)"/>
<path d="M572 210 L540 250 L540 290" fill="none" stroke="#D85A30" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow-red)"/>

<g>
<rect x="420" y="290" width="160" height="60" rx="8" fill="#fbeecf" stroke="#c9a13b" stroke-width="0.8"/>
<text x="500" y="312" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#222">Shared objective</text>
<text x="500" y="330" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#444">patient receives assessment</text>
</g>

<text x="500" y="385" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">Each role-filler acts on its own</text>
<text x="500" y="401" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">current obligations, in any order.</text>
<text x="500" y="417" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">The objective is evaluated from</text>
<text x="500" y="433" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">whichever obligations have</text>
<text x="500" y="449" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">actually been discharged.</text>
</svg>
